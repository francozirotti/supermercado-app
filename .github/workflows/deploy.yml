name: Deploy a VPS Hostinger

# Cada push a "main" actualiza automáticamente la app en el VPS:
# entra por SSH, trae los cambios con git pull, reinstala dependencias
# si cambiaron y reinicia el servicio.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # también se puede correr manualmente desde la pestaña Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH en el VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/supermercado-app
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart supermercado
            echo "Despliegue completado: $(date)"
